<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="function.js" defer></script>
</head>
<body>
    <h1>Mortgage Calculator</h1>
    <fieldset>
    <div id="inputs">
    <label id ="haha" for="pr">Principal: </label>
    <input type="number" id="pr"><br>

    <label for="ir">Interest Rate as %: </label>
    <input type="number" id="ir"><br>

    <label for="ti">Number of Years: </label>
    <input type="number" id="ti"><br>

    <label for="mp">Monthly Payment: </label>
    <input type="number" id="mp"><br>
    <br>
   
     Balance: <output id="ba"></input></div>
    
    <button onclick="calculate()">Calculate</button>
    <button onclick="reset()">Reset</button>
   
   
    </fieldset>
</body>
</html>
