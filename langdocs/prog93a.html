<!DOCTYPE html>
<html lang="en">
<head>
    <title>Prog93a</title>
</head>
<body>
    <label for="Kilowatts">kilow: </label>
    <input type="number" id="kilow">

    <button onclick="

        let kilow = document.getElementById('kilow').value;
        kilow = Number(kilow)

        let baserate = kilow * 0.0475
        let surcharge = baserate * 0.1
        let citytax = baserate * 0.03
        let total =  baserate + surcharge + citytax
        let latecharge = total + (total * 0.04)

        baserate = baserate.toFixed(2)
        surcharge = surcharge.toFixed(2)
        citytax = citytax.toFixed(2)
        total = total.toFixed(2)
        latecharge = latecharge.toFixed(2)

        document.writeln('Kilowatts Used = ' + kilow 
        + '<hr>Base Rate: $' + baserate + '<br>Surcharge: $'
        + surcharge + '<br>Citytax: $' + citytax +
        '<hr>Total: $' + total + '<br><br> After May 20th: $'
        + latecharge);
    ">Calculate</button>
</body>
</html>
